name: Keep Supabase Awake

on:
  schedule:
    # Exécution toutes les 12 heures
    - cron: '0 */12 * * *'

  # Permet aussi de lancer le workflow manuellement
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://cvyhvxhzkoqezrbhkesu.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
