name: Keep Supabase Awake

on:
  schedule:
    - cron: '*/30 * * * *'  # toutes les 30 min pour tester

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -i -s "https://cvyhvxhzkoqezrbhkesu.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
